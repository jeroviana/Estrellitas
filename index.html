<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrellas Jerovia</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo-noche: radial-gradient(circle at top, #4a192c 0%, #1a0b14 100%);
            --rosa-brillante: #ff7eb3;
            --rosa-claro: #ffb3c6;
            --cristal: rgba(255, 179, 198, 0.15);
            --dorado: #ffea00;
        }

        body {
            margin: 0;
            background: var(--fondo-noche);
            color: white;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px;
            width: 100%;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 0;
            color: var(--rosa-brillante);
            text-shadow: 0 0 15px rgba(255, 126, 179, 0.5);
        }

        /* Sección de Login */
        #login-section {
            margin-top: 30px;
            background: var(--cristal);
            padding: 30px;
            border-radius: 25px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 126, 179, 0.3);
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        select, input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            border: 2px solid var(--rosa-claro);
            background: rgba(255,255,255,0.9);
            color: #333;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            outline: none;
        }

        .btn-magico {
            background: linear-gradient(45deg, var(--rosa-brillante), #ff5285);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(255, 82, 133, 0.4);
        }

        .btn-magico:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255, 82, 133, 0.6); }

        /* Sección de Votación */
        #vote-section {
            display: none;
            padding: 30px 20px;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 900px;
        }

        .hermana-bubble {
            background: var(--cristal);
            border: 1px solid var(--rosa-brillante);
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            animation: float 4s ease-in-out infinite;
            text-align: center;
        }

        .hermana-bubble:hover:not(.ausente) {
            background: var(--rosa-brillante);
            color: white;
            transform: scale(1.1) !important;
            box-shadow: 0 0 15px var(--rosa-brillante);
        }

        /* ESTILO AUSENTE (OPCIÓN B) */
        .hermana-bubble.ausente {
            background: rgba(100, 100, 100, 0.2);
            border-color: #666;
            color: #888;
            cursor: not-allowed;
            animation: none;
            opacity: 0.6;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Overlays */
        .fullscreen-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 11, 20, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-box {
            background: var(--cristal);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid var(--rosa-claro);
            max-width: 400px;
        }

        .modal-box h2 { color: var(--rosa-claro); font-family: 'Playfair Display', serif; margin-top: 0; }
        .botones-modal { display: flex; gap: 15px; margin-top: 25px; }
        .btn-cancelar { background: transparent; border: 2px solid var(--rosa-claro); color: white; }

        .giant-star { font-size: 5rem; filter: drop-shadow(0 0 20px var(--dorado)); }
        .animar-estrella { animation: explodeStar 2s forwards ease-in-out; }

        @keyframes explodeStar {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(15) rotate(180deg); opacity: 1; }
            100% { transform: scale(50) rotate(360deg); opacity: 0; }
        }

        .mensaje-titulo { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--rosa-brillante); margin-bottom: 10px; }
        .mensaje-sub { font-size: 1.2rem; margin-bottom: 30px; }
    </style>
</head>
<body>

    <header id="main-header">
        <h1>Mérito de la Semana</h1>
        <p style="font-size: 0.9rem; color: var(--rosa-claro);">Reconoce el brillo de una hermana</p>
    </header>

    <div id="login-section">
        <p id="status-msg" style="font-size: 0.8rem; color: var(--rosa-claro); margin-bottom: 10px;">Cargando lista de la Asamblea...</p>
        <select id="select-usuario">
            <option value="">Esperando nombres...</option>
        </select>
        <input type="password" id="pass-usuario" placeholder="Tu contraseña">
        <button class="btn-magico" onclick="acceder()">Validar Identidad</button>
    </div>

    <div id="vote-section"></div>

    <div id="custom-confirm" class="fullscreen-overlay">
        <div class="modal-box">
            <h2 id="confirm-text">¿Confirmas tu estrella?</h2>
            <div class="botones-modal">
                <button class="btn-magico btn-cancelar" onclick="cerrarModal()">Cancelar</button>
                <button class="btn-magico" onclick="procesarVoto()">Sí, enviar</button>
            </div>
        </div>
    </div>

    <div id="loading-screen" class="fullscreen-overlay">
        <h2 style="color: var(--rosa-claro);">Conectando con las estrellas... ✨</h2>
    </div>

    <div id="star-anim-screen" class="fullscreen-overlay">
        <div id="the-star" class="giant-star">⭐</div>
    </div>

    <div id="success-screen" class="fullscreen-overlay">
        <div class="mensaje-titulo">Estrella enviada.</div>
        <div class="mensaje-sub">¡Gracias mi hermana!</div>
        <button class="btn-magico" style="max-width: 250px;" onclick="location.reload()">Volver a inicio</button>
    </div>

    <div id="error-screen" class="fullscreen-overlay">
        <div class="mensaje-titulo">¡Lo sentimos!</div>
        <div id="error-motivo" class="mensaje-sub">Parece que esta semana no estás habilitada para votar.</div>
        <button class="btn-magico btn-cancelar" style="max-width: 250px;" onclick="location.reload()">Volver</button>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwZC6cOAM7oSEPkQ75Nxea1HZRIiZWYb-wospwtYBW7WxenPDxWHK8PYYxnKcCn3PhPkQ/exec";
    let listaHermanasRaw = []; // Guardará objetos con {nombre, asistencia}
    let usuarioActual = "";
    let passActual = "";
    let hermanaElegida = "";

    async function cargarHermanas() {
        try {
            const resp = await fetch(SCRIPT_URL + "?t=" + new Date().getTime());
            const data = await resp.json();
            
            // Adaptamos según si el Script manda solo nombres o objetos
            listaHermanasRaw = data.map(h => {
                return typeof h === 'object' ? h : { nombre: h, asistencia: "SÍ" };
            });
            
            const select = document.getElementById('select-usuario');
            select.innerHTML = '<option value="">Selecciona tu nombre</option>';
            
            listaHermanasRaw.forEach(h => {
                const opt = document.createElement('option');
                opt.value = h.nombre;
                opt.textContent = h.nombre;
                select.appendChild(opt);
            });
            document.getElementById('status-msg').innerText = "Lista actualizada ✨";
        } catch (e) {
            document.getElementById('status-msg').innerText = "Hubo un error al cargar la lista.";
        }
    }

    async function acceder() {
        const user = document.getElementById('select-usuario').value;
        const pass = document.getElementById('pass-usuario').value;
        
        if(!user || !pass) {
            alert("Completa tus credenciales, por favor.");
            return;
        }

        usuarioActual = user;
        passActual = pass;
        document.getElementById('loading-screen').style.display = 'flex';

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "login",
                    votante: usuarioActual,
                    password: passActual
                })
            });
            
            const res = await response.json();
            document.getElementById('loading-screen').style.display = 'none';

            if (res.status === "Login OK") {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('vote-section').style.display = 'flex';
                renderBubbles();
            } else {
                mostrarError(res.status);
            }
        } catch (e) {
            document.getElementById('loading-screen').style.display = 'none';
            alert("Error de conexión.");
        }
    }

    function renderBubbles() {
        const div = document.getElementById('vote-section');
        div.innerHTML = "";
        
        // Filtramos para que no aparezca la misma usuaria
        const hermanasFiltradas = listaHermanasRaw.filter(h => h.nombre !== usuarioActual);
        
        hermanasFiltradas.forEach(h => {
            const bubble = document.createElement('div');
            const estaPresente = h.asistencia.toUpperCase() === "SÍ";
            
            bubble.className = estaPresente ? 'hermana-bubble' : 'hermana-bubble ausente';
            bubble.innerHTML = estaPresente ? h.nombre : `${h.nombre}<br><small>(Ausente)</small>`;
            
            if(estaPresente) {
                bubble.onclick = () => abrirModal(h.nombre);
            }
            
            div.appendChild(bubble);
        });
    }

    function abrirModal(elegida) {
        hermanaElegida = elegida;
        document.getElementById('confirm-text').innerText = `¿Quieres dar tu estrella de hoy a ${elegida}?`;
        document.getElementById('custom-confirm').style.display = 'flex';
    }

    function cerrarModal() {
        document.getElementById('custom-confirm').style.display = 'none';
    }

    async function procesarVoto() {
        cerrarModal();
        document.getElementById('loading-screen').style.display = 'flex';

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "votar",
                    votante: usuarioActual,
                    password: passActual,
                    elegida: hermanaElegida
                })
            });
            
            const res = await response.json();
            document.getElementById('loading-screen').style.display = 'none';

            if (res.status.includes("éxito")) {
                iniciarAnimacion();
            } else {
                mostrarError(res.status);
            }
        } catch (e) {
            document.getElementById('loading-screen').style.display = 'none';
            mostrarError("Error al enviar la estrella.");
        }
    }

    function iniciarAnimacion() {
        const animScreen = document.getElementById('star-anim-screen');
        const star = document.getElementById('the-star');
        document.getElementById('main-header').style.display = 'none';
        document.getElementById('vote-section').style.display = 'none';
        animScreen.style.display = 'flex';
        star.classList.add('animar-estrella');
        setTimeout(() => {
            animScreen.style.display = 'none';
            document.getElementById('success-screen').style.display = 'flex';
        }, 2000);
    }

    function mostrarError(motivo) {
        document.getElementById('main-header').style.display = 'none';
        document.getElementById('vote-section').style.display = 'none';
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('error-motivo').innerText = motivo;
        document.getElementById('error-screen').style.display = 'flex';
    }

    window.onload = cargarHermanas;
</script>
</body>
</html>
